# Grafana datasource auto-provisioning (roadmap #46).
# Resolves via docker-compose's internal DNS — prometheus / loki are the
# service names in docker-compose.observability.yml.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
